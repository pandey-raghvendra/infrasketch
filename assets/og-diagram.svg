<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#03071b"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#06d6a0"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.25"/>
    </filter>
    <filter id="cardshadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Ambient glow -->
  <ellipse cx="900" cy="200" rx="280" ry="180" fill="#06d6a0" opacity="0.06" filter="url(#glow)"/>
  <ellipse cx="350" cy="450" rx="200" ry="140" fill="#22d3ee" opacity="0.04" filter="url(#glow)"/>

  <!-- ── LEFT PANEL: branding ──────────────────────────────────────── -->

  <!-- Logo mark -->
  <g transform="translate(72, 68)">
    <!-- Bracket left -->
    <path d="M0 0 L-8 0 L-8 48 L0 48" fill="none" stroke="#06d6a0" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Bracket right -->
    <path d="M36 0 L44 0 L44 48 L36 48" fill="none" stroke="#06d6a0" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Underscore -->
    <line x1="8" y1="24" x2="28" y2="24" stroke="#06d6a0" stroke-width="3.5" stroke-linecap="round"/>
  </g>

  <text x="130" y="102" font-family="DM Sans, system-ui, sans-serif" font-size="38" font-weight="800" fill="white">InfraSketch</text>
  <text x="130" y="128" font-family="DM Mono, monospace" font-size="13" font-weight="500" fill="#64748b" letter-spacing="1">.cloud</text>

  <!-- Tagline -->
  <text x="72" y="185" font-family="DM Sans, system-ui, sans-serif" font-size="28" font-weight="700" fill="white">IaC → Architecture Diagram</text>
  <text x="72" y="220" font-family="DM Sans, system-ui, sans-serif" font-size="16" font-weight="400" fill="#64748b">Paste Terraform, Kubernetes, CloudFormation, CDK,</text>
  <text x="72" y="242" font-family="DM Sans, system-ui, sans-serif" font-size="16" font-weight="400" fill="#64748b">Pulumi, Bicep, Terragrunt or Docker Compose.</text>
  <text x="72" y="264" font-family="DM Sans, system-ui, sans-serif" font-size="16" font-weight="400" fill="#06d6a0">Get a clean exportable diagram in seconds.</text>

  <!-- Pills row -->
  <g transform="translate(72, 295)">
    <!-- AWS pill -->
    <rect x="0" y="0" width="54" height="22" rx="11" fill="rgba(255,107,53,0.12)" stroke="rgba(255,107,53,0.3)" stroke-width="1"/>
    <circle cx="11" cy="11" r="3.5" fill="#ff6b35"/>
    <text x="19" y="15" font-family="DM Sans, sans-serif" font-size="11" font-weight="600" fill="#ff6b35">AWS</text>

    <!-- Azure pill -->
    <rect x="62" y="0" width="60" height="22" rx="11" fill="rgba(0,120,212,0.12)" stroke="rgba(0,120,212,0.3)" stroke-width="1"/>
    <circle cx="73" cy="11" r="3.5" fill="#0078D4"/>
    <text x="81" y="15" font-family="DM Sans, sans-serif" font-size="11" font-weight="600" fill="#0078D4">Azure</text>

    <!-- GCP pill -->
    <rect x="130" y="0" width="52" height="22" rx="11" fill="rgba(255,209,102,0.12)" stroke="rgba(255,209,102,0.3)" stroke-width="1"/>
    <circle cx="141" cy="11" r="3.5" fill="#ffd166"/>
    <text x="149" y="15" font-family="DM Sans, sans-serif" font-size="11" font-weight="600" fill="#ffd166">GCP</text>

    <!-- K8s pill -->
    <rect x="0" y="30" width="96" height="22" rx="11" fill="rgba(50,108,229,0.12)" stroke="rgba(50,108,229,0.3)" stroke-width="1"/>
    <circle cx="11" cy="41" r="3.5" fill="#326CE5"/>
    <text x="19" y="45" font-family="DM Sans, sans-serif" font-size="11" font-weight="600" fill="#326CE5">Kubernetes</text>

    <!-- TF pill -->
    <rect x="104" y="30" width="78" height="22" rx="11" fill="rgba(6,214,160,0.12)" stroke="rgba(6,214,160,0.3)" stroke-width="1"/>
    <circle cx="115" cy="41" r="3.5" fill="#06d6a0"/>
    <text x="123" y="45" font-family="DM Sans, sans-serif" font-size="11" font-weight="600" fill="#06d6a0">Terraform</text>
  </g>

  <!-- Stats row -->
  <g transform="translate(72, 400)">
    <text x="0" y="0" font-family="DM Sans, sans-serif" font-size="28" font-weight="800" fill="white">85+</text>
    <text x="0" y="18" font-family="DM Sans, sans-serif" font-size="11" fill="#64748b">Resource types</text>

    <text x="90" y="0" font-family="DM Sans, sans-serif" font-size="28" font-weight="800" fill="white">8</text>
    <text x="90" y="18" font-family="DM Sans, sans-serif" font-size="11" fill="#64748b">IaC formats</text>

    <text x="145" y="0" font-family="DM Sans, sans-serif" font-size="28" font-weight="800" fill="#06d6a0">Free</text>
    <text x="145" y="18" font-family="DM Sans, sans-serif" font-size="11" fill="#64748b">Always</text>
  </g>

  <!-- Divider line -->
  <line x1="450" y1="40" x2="450" y2="590" stroke="#1e293b" stroke-width="1"/>

  <!-- ── RIGHT PANEL: diagram preview ─────────────────────────────── -->

  <!-- Diagram background -->
  <rect x="474" y="30" width="700" height="570" rx="16" fill="#f0f2f7"/>

  <!-- VPC container -->
  <rect x="500" y="55" width="648" height="500" rx="12" fill="white" stroke="#f59e0b" stroke-width="2"/>
  <rect x="500" y="55" width="648" height="30" rx="12" fill="#fffbeb" stroke="#f59e0b" stroke-width="2"/>
  <rect x="500" y="72" width="648" height="14" fill="#fffbeb"/>
  <text x="514" y="74" font-family="DM Sans, sans-serif" font-size="11" font-weight="700" fill="#b45309">VPC — main</text>

  <!-- Internet zone -->
  <rect x="512" y="68" width="620" height="62" rx="8" fill="#e8edf5" stroke="#94a3b8" stroke-width="1" stroke-dasharray="5 3" opacity="0.9"/>
  <text x="522" y="83" font-family="DM Sans, sans-serif" font-size="9" font-weight="700" fill="#64748b" letter-spacing="0.8">INTERNET</text>

  <!-- Subnet public -->
  <rect x="512" y="148" width="612" height="110" rx="8" fill="#f0f7ff" stroke="#93c5fd" stroke-width="1.5" stroke-dasharray="5 3"/>
  <text x="520" y="162" font-family="DM Sans, sans-serif" font-size="9" font-weight="600" fill="#2563eb">subnet — public</text>

  <!-- Subnet private -->
  <rect x="512" y="272" width="612" height="110" rx="8" fill="#f0f7ff" stroke="#93c5fd" stroke-width="1.5" stroke-dasharray="5 3"/>
  <text x="520" y="286" font-family="DM Sans, sans-serif" font-size="9" font-weight="600" fill="#2563eb">subnet — private</text>

  <!-- Data zone -->
  <rect x="512" y="396" width="612" height="110" rx="8" fill="#f0f9ff" stroke="#38bdf8" stroke-width="1" stroke-dasharray="5 3" opacity="0.9"/>
  <text x="520" y="412" font-family="DM Sans, sans-serif" font-size="9" font-weight="700" fill="#0369a1" letter-spacing="0.8">DATA</text>

  <!-- Connection lines -->
  <path d="M620,108 L620,148" fill="none" stroke="#374151" stroke-width="1.5" stroke-dasharray="4 2" opacity="0.6" marker-end="url(#arr)"/>
  <path d="M680,258 L680,272" fill="none" stroke="#374151" stroke-width="1.5" stroke-dasharray="4 2" opacity="0.6" marker-end="url(#arr)"/>
  <path d="M680,382 L680,396" fill="none" stroke="#374151" stroke-width="1.5" stroke-dasharray="4 2" opacity="0.6" marker-end="url(#arr)"/>
  <path d="M760,258 L760,272" fill="none" stroke="#374151" stroke-width="1.5" stroke-dasharray="4 2" opacity="0.6" marker-end="url(#arr)"/>
  <path d="M840,258 L840,272" fill="none" stroke="#374151" stroke-width="1.5" stroke-dasharray="4 2" opacity="0.6" marker-end="url(#arr)"/>
  <path d="M840,382 L840,396" fill="none" stroke="#374151" stroke-width="1.5" stroke-dasharray="4 2" opacity="0.6" marker-end="url(#arr)"/>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#374151"/>
    </marker>
  </defs>

  <!-- ── Node helper macro: x y color label name ── -->

  <!-- Route53 (internet zone) -->
  <g filter="url(#cardshadow)">
    <rect x="588" y="74" width="72" height="52" rx="8" fill="white" stroke="#8C4FFF" stroke-width="1" stroke-opacity="0.35"/>
    <rect x="589" y="74" width="70" height="50" rx="7" fill="#8C4FFF" opacity="0.05"/>
    <rect x="596" y="74" width="56" height="3" rx="1.5" fill="#8C4FFF"/>
    <rect x="600" y="81" width="24" height="24" rx="4" fill="#8C4FFF" opacity="0.15"/>
    <text x="612" y="97" text-anchor="middle" font-family="DM Sans, sans-serif" font-size="8" font-weight="700" fill="#8C4FFF">R53</text>
    <text x="624" y="116" text-anchor="middle" font-family="DM Sans, sans-serif" font-size="9" font-weight="700" fill="#111827">Route53</text>
    <text x="624" y="126" text-anchor="middle" font-family="DM Mono, monospace" font-size="7" fill="#6b7280">main</text>
  </g>

  <!-- CloudFront (internet zone) -->
  <g filter="url(#cardshadow)">
    <rect x="680" y="74" width="72" height="52" rx="8" fill="white" stroke="#8C4FFF" stroke-width="1" stroke-opacity="0.35"/>
    <rect x="681" y="74" width="70" height="50" rx="7" fill="#8C4FFF" opacity="0.05"/>
    <rect x="688" y="74" width="56" height="3" rx="1.5" fill="#8C4FFF"/>
    <rect x="692" y="81" width="24" height="24" rx="4" fill="#8C4FFF" opacity="0.15"/>
    <text x="704" y="97" text-anchor="middle" font-family="DM Sans, sans-serif" font-size="8" font-weight="700" fill="#8C4FFF">CF</text>
    <text x="716" y="116" text-anchor="middle" font-family="DM Sans, sans-serif" font-size="9" font-weight="700" fill="#111827">CloudFront</text>
    <text x="716" y="126" text-anchor="middle" font-family="DM Mono, monospace" font-size="7" fill="#6b7280">cdn</text>
  </g>

  <!-- ALB (public subnet) -->
  <g filter="url(#cardshadow)">
    <rect x="588" y="168" width="72" height="52" rx="8" fill="white" stroke="#8C4FFF" stroke-width="1" stroke-opacity="0.35"/>
    <rect x="589" y="168" width="70" height="50" rx="7" fill="#8C4FFF" opacity="0.05"/>
    <rect x="596" y="168" width="56" height="3" rx="1.5" fill="#8C4FFF"/>
    <rect x="600" y="175" width="24" height="24" rx="4" fill="#8C4FFF" opacity="0.15"/>
    <text x="612" y="191" text-anchor="middle" font-family="DM Sans, sans-serif" font-size="8" font-weight="700" fill="#8C4FFF">ALB</text>
    <text x="624" y="210" text-anchor="middle" font-family="DM Sans, sans-serif" font-size="9" font-weight="700" fill="#111827">App LB</text>
    <text x="624" y="220" text-anchor="middle" font-family="DM Mono, monospace" font-size="7" fill="#6b7280">frontend</text>
  </g>

  <!-- NAT (public subnet) -->
  <g filter="url(#cardshadow)">
    <rect x="680" y="168" width="72" height="52" rx="8" fill="white" stroke="#8C4FFF" stroke-width="1" stroke-opacity="0.35"/>
    <rect x="681" y="168" width="70" height="50" rx="7" fill="#8C4FFF" opacity="0.05"/>
    <rect x="688" y="168" width="56" height="3" rx="1.5" fill="#8C4FFF"/>
    <rect x="692" y="175" width="24" height="24" rx="4" fill="#8C4FFF" opacity="0.15"/>
    <text x="704" y="191" text-anchor="middle" font-family="DM Sans, sans-serif" font-size="8" font-weight="700" fill="#8C4FFF">NAT</text>
    <text x="716" y="210" text-anchor="middle" font-family="DM Sans, sans-serif" font-size="9" font-weight="700" fill="#111827">NAT GW</text>
    <text x="716" y="220" text-anchor="middle" font-family="DM Mono, monospace" font-size="7" fill="#6b7280">main</text>
  </g>

  <!-- ECS (private subnet) -->
  <g filter="url(#cardshadow)">
    <rect x="588" y="292" width="72" height="52" rx="8" fill="white" stroke="#ED7100" stroke-width="1" stroke-opacity="0.35"/>
    <rect x="589" y="292" width="70" height="50" rx="7" fill="#ED7100" opacity="0.05"/>
    <rect x="596" y="292" width="56" height="3" rx="1.5" fill="#ED7100"/>
    <rect x="600" y="299" width="24" height="24" rx="4" fill="#ED7100" opacity="0.15"/>
    <text x="612" y="315" text-anchor="middle" font-family="DM Sans, sans-serif" font-size="8" font-weight="700" fill="#ED7100">ECS</text>
    <text x="624" y="334" text-anchor="middle" font-family="DM Sans, sans-serif" font-size="9" font-weight="700" fill="#111827">ECS Cluster</text>
    <text x="624" y="344" text-anchor="middle" font-family="DM Mono, monospace" font-size="7" fill="#6b7280">app</text>
  </g>

  <!-- Lambda (private subnet) -->
  <g filter="url(#cardshadow)">
    <rect x="680" y="292" width="72" height="52" rx="8" fill="white" stroke="#ED7100" stroke-width="1" stroke-opacity="0.35"/>
    <rect x="681" y="292" width="70" height="50" rx="7" fill="#ED7100" opacity="0.05"/>
    <rect x="688" y="292" width="56" height="3" rx="1.5" fill="#ED7100"/>
    <rect x="692" y="299" width="24" height="24" rx="4" fill="#ED7100" opacity="0.15"/>
    <text x="704" y="315" text-anchor="middle" font-family="DM Sans, sans-serif" font-size="8" font-weight="700" fill="#ED7100">λ</text>
    <text x="716" y="334" text-anchor="middle" font-family="DM Sans, sans-serif" font-size="9" font-weight="700" fill="#111827">Lambda</text>
    <text x="716" y="344" text-anchor="middle" font-family="DM Mono, monospace" font-size="7" fill="#6b7280">worker</text>
  </g>

  <!-- ElastiCache (private subnet) -->
  <g filter="url(#cardshadow)">
    <rect x="776" y="292" width="72" height="52" rx="8" fill="white" stroke="#C7131F" stroke-width="1" stroke-opacity="0.35"/>
    <rect x="777" y="292" width="70" height="50" rx="7" fill="#C7131F" opacity="0.05"/>
    <rect x="784" y="292" width="56" height="3" rx="1.5" fill="#C7131F"/>
    <rect x="788" y="299" width="24" height="24" rx="4" fill="#C7131F" opacity="0.15"/>
    <text x="800" y="315" text-anchor="middle" font-family="DM Sans, sans-serif" font-size="7" font-weight="700" fill="#C7131F">CACHE</text>
    <text x="812" y="334" text-anchor="middle" font-family="DM Sans, sans-serif" font-size="9" font-weight="700" fill="#111827">ElastiCache</text>
    <text x="812" y="344" text-anchor="middle" font-family="DM Mono, monospace" font-size="7" fill="#6b7280">redis</text>
  </g>

  <!-- RDS (data zone) -->
  <g filter="url(#cardshadow)">
    <rect x="588" y="416" width="72" height="52" rx="8" fill="white" stroke="#C7131F" stroke-width="1" stroke-opacity="0.35"/>
    <rect x="589" y="416" width="70" height="50" rx="7" fill="#C7131F" opacity="0.05"/>
    <rect x="596" y="416" width="56" height="3" rx="1.5" fill="#C7131F"/>
    <rect x="600" y="423" width="24" height="24" rx="4" fill="#C7131F" opacity="0.15"/>
    <text x="612" y="439" text-anchor="middle" font-family="DM Sans, sans-serif" font-size="8" font-weight="700" fill="#C7131F">RDS</text>
    <text x="624" y="458" text-anchor="middle" font-family="DM Sans, sans-serif" font-size="9" font-weight="700" fill="#111827">RDS</text>
    <text x="624" y="468" text-anchor="middle" font-family="DM Mono, monospace" font-size="7" fill="#6b7280">postgres</text>
  </g>

  <!-- DynamoDB (data zone) -->
  <g filter="url(#cardshadow)">
    <rect x="680" y="416" width="72" height="52" rx="8" fill="white" stroke="#C7131F" stroke-width="1" stroke-opacity="0.35"/>
    <rect x="681" y="416" width="70" height="50" rx="7" fill="#C7131F" opacity="0.05"/>
    <rect x="688" y="416" width="56" height="3" rx="1.5" fill="#C7131F"/>
    <rect x="692" y="423" width="24" height="24" rx="4" fill="#C7131F" opacity="0.15"/>
    <text x="704" y="439" text-anchor="middle" font-family="DM Sans, sans-serif" font-size="8" font-weight="700" fill="#C7131F">DDB</text>
    <text x="716" y="458" text-anchor="middle" font-family="DM Sans, sans-serif" font-size="9" font-weight="700" fill="#111827">DynamoDB</text>
    <text x="716" y="468" text-anchor="middle" font-family="DM Mono, monospace" font-size="7" fill="#6b7280">sessions</text>
  </g>

  <!-- S3 (data zone) -->
  <g filter="url(#cardshadow)">
    <rect x="776" y="416" width="72" height="52" rx="8" fill="white" stroke="#7AA116" stroke-width="1" stroke-opacity="0.35"/>
    <rect x="777" y="416" width="70" height="50" rx="7" fill="#7AA116" opacity="0.05"/>
    <rect x="784" y="416" width="56" height="3" rx="1.5" fill="#7AA116"/>
    <rect x="788" y="423" width="24" height="24" rx="4" fill="#7AA116" opacity="0.15"/>
    <text x="800" y="439" text-anchor="middle" font-family="DM Sans, sans-serif" font-size="8" font-weight="700" fill="#7AA116">S3</text>
    <text x="812" y="458" text-anchor="middle" font-family="DM Sans, sans-serif" font-size="9" font-weight="700" fill="#111827">S3 Bucket</text>
    <text x="812" y="468" text-anchor="middle" font-family="DM Mono, monospace" font-size="7" fill="#6b7280">assets</text>
  </g>

  <!-- Bottom watermark -->
  <text x="1186" y="618" text-anchor="end" font-family="DM Sans, sans-serif" font-size="11" font-weight="600" fill="#334155" opacity="0.5">infrasketch.cloud</text>
</svg>
