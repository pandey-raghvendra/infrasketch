  <!-- Node 2 -->
  <rect x="35" y="9" width="20" height="20" rx="3" fill="none" stroke="#fff" stroke-width="2"/>
  <rect x="41" y="15" width="8" height="8" rx="1.5" fill="#fff"/>
  <!-- Node 3 -->
  <rect x="9" y="35" width="20" height="20" rx="3" fill="none" stroke="#fff" stroke-width="2"/>
  <rect x="15" y="41" width="8" height="8" rx="1.5" fill="#fff"/>
  <!-- Node 4 -->
  <rect x="35" y="35" width="20" height="20" rx="3" fill="none" stroke="#fff" stroke-width="2"/>
