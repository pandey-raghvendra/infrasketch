  <line x1="32" y1="23" x2="32" y2="11" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="32" y1="41" x2="32" y2="53" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="23" y1="32" x2="11" y2="32" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="41" y1="32" x2="53" y2="32" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Endpoint dots -->
  <circle cx="32" cy="10" r="3.5" fill="#fff"/>
  <circle cx="32" cy="54" r="3.5" fill="#fff"/>
  <circle cx="10" cy="32" r="3.5" fill="#fff"/>
