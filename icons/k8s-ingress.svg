<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <rect width="64" height="64" rx="6" fill="#326CE5"/>
  <!-- Ingress: internet arrow flowing into a gateway -->
  <!-- External arrow from left -->
  <line x1="8" y1="32" x2="22" y2="32" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
  <polyline points="18,27 23,32 18,37" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Gateway/door shape -->
  <rect x="24" y="18" width="18" height="28" rx="2" fill="none" stroke="#fff" stroke-width="2.5"/>
  <!-- Lines inside gateway (routing rules) -->
  <line x1="28" y1="26" x2="38" y2="26" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="28" y1="32" x2="38" y2="32" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="28" y1="38" x2="38" y2="38" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Arrow out to services -->
  <line x1="42" y1="32" x2="56" y2="32" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
  <polyline points="52,27 57,32 52,37" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
